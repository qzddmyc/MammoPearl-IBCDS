<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>乳此侦析 - 用户登录</title>
    <link rel="icon" href="../static/assets/img/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="../static/css/star.css">
    <style>
        /* 全局样式继承原页面 */
        * {
            margin: 0;
            padding: 0;
            user-select: none;
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: #e0f0ff;
            min-height: 100vh;
            overflow-x: hidden;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 登录容器：左右分栏布局（调整为3:7比例） */
        .login-container {
            display: flex;
            width: 100vw;
            min-height: 100vh;
            position: relative;
            z-index: 10;
        }

        /* 左侧装饰区 - 占30%宽度（原40%） */
        .left-decoration {
            width: 30%;
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, rgba(12, 34, 51, 0.8), rgba(23, 64, 95, 0.9));
        }

        /* 左侧背景设计 - 保留原科技感样式 */
        .left-decoration::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(41, 182, 246, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(41, 182, 246, 0.1) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: 1;
        }

        .left-decoration::after {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(41, 182, 246, 0.3) 0%, rgba(41, 182, 246, 0) 70%);
            z-index: 2;
            animation: pulse 6s infinite ease-in-out;
        }

        /* 右侧表单区 - 占70%宽度（原60%） */
        .right-form {
            width: 70%;
            padding: 50px;
            background: rgba(12, 34, 51, 0.3);
            backdrop-filter: blur(15px);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 表单容器 - 桌面端靠左居中，移动端会优化 */
        .form-container {
            max-width: 450px;
            /* 适度加宽，适配70%的右侧宽度 */
            width: 100%;
            margin: 0 auto 0 12%;
            /* 左侧间距微调，保持视觉平衡 */
            margin-top: auto;
            margin-bottom: auto;
        }

        /* 返回按钮样式 - 保留原交互 */
        .back-btn {
            display: inline-block;
            margin-bottom: 30px;
            color: #b3e5fc;
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            padding: 6px 12px;
            border-radius: 6px;
            background: rgba(41, 182, 246, 0.1);
        }

        .back-btn:hover {
            color: #e0f0ff;
            background: rgba(41, 182, 246, 0.2);
            transform: translateX(-3px);
        }

        .back-btn i {
            margin-right: 6px;
        }

        .form-title {
            margin-bottom: 40px;
            font-size: 1.8rem;
            background: linear-gradient(90deg, #4fc3f7, #29b6f6, #03a9f4);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 15px rgba(41, 182, 246, 0.3);
        }

        /* 表单输入组样式 - 保留原交互 */
        .form-group {
            margin-bottom: 25px;
            position: relative;
        }

        .form-group::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 1px;
            background: linear-gradient(90deg, #4fc3f7, #29b6f6);
            transition: width 0.3s ease;
        }

        .form-group:focus-within::after {
            width: 100%;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            color: #b3e5fc;
            font-size: 0.95rem;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            background-color: rgba(15, 30, 45, 0.2);
            border: 1px solid rgba(41, 182, 246, 0.3);
            border-radius: 8px;
            color: #e0f0ff;
            font-size: 1rem;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

        .form-input:focus {
            outline: none;
            border-color: transparent;
            box-shadow: none;
            background-color: transparent;
            backdrop-filter: none;
        }

        /* 提交按钮样式 - 保留原交互 */
        .submit-container {
            margin-top: 60px;
            margin-bottom: 40px;
        }

        .submit-btn {
            width: 100%;
            --submitbtn_h: 48px;
            height: var(--submitbtn_h);
            line-height: calc(var(--submitbtn_h) + 2px);
            text-align: center;
            /* padding: 14px 0; */
            background: rgba(41, 182, 246, 0.1);
            border: 1px solid #29b6f6;
            border-radius: 50px;
            color: #29b6f6;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            backdrop-filter: blur(5px);
        }

        .submit-btn:hover {
            background: rgba(41, 182, 246, 0.2);
            box-shadow: 0 0 20px rgba(41, 182, 246, 0.3);
            transform: translateY(-2px);
        }

        /* 动画效果 - 保留 */
        @keyframes pulse {

            0%,
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0.6;
            }

            50% {
                transform: translate(-50%, -50%) scale(1.2);
                opacity: 0.9;
            }
        }

        /* 响应式适配（核心修改：移动端表单加边框+居中） */
        @media (max-width: 768px) {

            /* 隐藏左侧装饰区 */
            .left-decoration {
                display: none;
            }

            /* 右侧表单区占满屏幕 */
            .right-form {
                width: 100%;
                padding: 30px 20px;
            }

            /* 表单容器：完全居中 + 加边框 */
            .form-container {
                width: 90%;
                max-width: 530px;
                min-height: 404px;
                /* 适配移动端宽度，避免过宽 */
                margin: auto;
                /* 上下左右完全居中 */
                padding: 30px;
                /* 内边距，让边框和内容有间距 */
                border: 1px solid rgba(41, 182, 246, 0.2);
                /* 移动端专属边框，匹配原设计色调 */
                border-radius: 12px;
                /* 轻微圆角，提升美观度 */
                background: rgba(12, 34, 51, 0.4);
                /* 加深背景，突出边框层次感 */
            }

            /* 移动端表单标题微调 */
            .form-title {
                font-size: 1.5rem;
                margin-bottom: 30px;
                text-align: center;
                /* 移动端标题居中，更协调 */
            }

            /* 移动端按钮和返回键微调 */
            .submit-btn {
                --submitbtn_h: 40px;
                /* padding: 12px 0; */
                font-size: 1rem;
            }

            .back-btn {
                margin-bottom: 20px;
                display: inline-block;
                /* 确保返回键不换行 */
            }

            .submit-container {
                margin-top: 45px;
                margin-bottom: 7px;
            }
        }

        /* 小屏移动端（425px以下）优化 */
        @media (max-width: 425px) {
            .right-form {
                padding: 20px 15px;
            }

            .form-container {
                padding: 25px 15px;
                /* 减小内边距，适配小屏 */
                max-width: 95%;
            }

            .form-group {
                margin-bottom: 20px;
            }

            .form-input {
                padding: 10px 14px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>

<body>
    <!-- 背景星空（复用star.css） -->
    <div class="star-container">
        <div class="layer1"></div>
        <div class="layer2"></div>
        <div class="layer3"></div>
        <div class="layer4"></div>
        <div class="layer5"></div>
    </div>

    <!-- 登录主容器 -->
    <div class="login-container">
        <!-- 左侧装饰区（桌面端显示） -->
        <div class="left-decoration"></div>

        <!-- 右侧登录表单区 -->
        <div class="right-form">
            <div class="form-container">
                <!-- 返回按钮 -->
                <a href="./index.html" class="back-btn">
                    <i>←</i> 返回首页
                </a>

                <h2 class="form-title">用户登录</h2>
                <form autocomplete="off">
                    <!-- 用户名输入组 -->
                    <div class="form-group">
                        <label class="form-label" for="username">用户姓名</label>
                        <input type="text" id="username" class="form-input" placeholder="请输入您的姓名" required>
                    </div>

                    <!-- 密码输入组 -->
                    <div class="form-group">
                        <label class="form-label" for="password">用户密码</label>
                        <input type="password" id="password" class="form-input" placeholder="请输入您的密码" required>
                    </div>

                    <!-- 提交按钮 -->
                    <div class="submit-container">
                        <button type="submit" class="submit-btn">登录</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>

</html>
