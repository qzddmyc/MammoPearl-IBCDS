<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>乳此侦析 - 用户登录</title>
    <link rel="icon" href="../static/assets/img/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="../static/css/star.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            user-select: none;
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: #e0f0ff;
            min-height: 100vh;
            overflow-x: hidden;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }


        .login-container {
            display: flex;
            width: 100vw;
            min-height: 100vh;
            position: relative;
            z-index: 10;
        }


        .left-decoration {
            width: 30%;
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, rgba(12, 34, 51, 0.8), rgba(23, 64, 95, 0.9));
        }


        .left-decoration::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(41, 182, 246, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(41, 182, 246, 0.1) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: 1;
        }


        .circle {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(41, 182, 246, 0.3) 0%, rgba(41, 182, 246, 0) 70%);
            z-index: 2;
            transition: all 0.3s ease-out;

            transform-origin: center center;
        }


        .circle1 {
            width: 200px;
            height: 200px;
            animation: pulse 6s infinite ease-in-out;
        }

        .circle2 {
            width: 150px;
            height: 150px;
            animation: pulse 8s infinite ease-in-out 1s;
        }


        .right-form {
            width: 70%;
            padding: 50px;
            background: rgba(12, 34, 51, 0.3);
            backdrop-filter: blur(15px);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }


        .form-container {
            max-width: 450px;
            width: 100%;
            margin: 0 auto 0 12%;
            margin-top: auto;
            margin-bottom: auto;
        }


        .back-btn {
            display: inline-block;
            margin-bottom: 30px;
            color: #b3e5fc;
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            padding: 6px 12px;
            border-radius: 6px;
            background: rgba(41, 182, 246, 0.1);
        }

        .back-btn:hover {
            color: #e0f0ff;
            background: rgba(41, 182, 246, 0.2);
            transform: translateX(-3px);
        }

        .back-btn i {
            margin-right: 6px;
        }

        .form-title {
            margin-bottom: 40px;
            font-size: 1.8rem;
            background: linear-gradient(90deg, #4fc3f7, #29b6f6, #03a9f4);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 15px rgba(41, 182, 246, 0.3);
        }


        .form-group {
            margin-bottom: 25px;
            position: relative;
        }

        .form-group::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 1px;
            background: linear-gradient(90deg, #4fc3f7, #29b6f6);
            transition: width 0.3s ease;
        }

        .form-group:focus-within::after {
            width: 100%;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            color: #b3e5fc;
            font-size: 0.95rem;
            padding-left: 2px;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            background-color: rgba(15, 30, 45, 0.2);
            border: 1px solid rgba(41, 182, 246, 0.3);
            border-radius: 8px;
            color: #e0f0ff;
            font-size: 1rem;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

        .form-input:focus {
            outline: none;
            border-color: transparent;
            box-shadow: none;
            background-color: transparent;
            backdrop-filter: none;
        }


        .submit-container {
            margin-top: 50px;
            margin-bottom: 40px;
        }

        .submit-btn {
            width: 100%;
            --submitbtn_h: 48px;
            height: var(--submitbtn_h);
            line-height: var(--submitbtn_h);
            text-align: center;
            background: rgba(41, 182, 246, 0.1);
            border: 1px solid #29b6f6;
            border-radius: 50px;
            color: #29b6f6;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            backdrop-filter: blur(5px);
        }

        .submit-btn:hover {
            background: rgba(41, 182, 246, 0.2);
            box-shadow: 0 0 20px rgba(41, 182, 246, 0.3);
            transform: translateY(-2px);
        }

        .submit-container p {
            margin-bottom: 12px;
            font-size: 0.8rem;
            color: #b3e5fc88;
        }

        .shake {
            animation: shake 1s linear;
            border: 1px solid #aaa;
        }

        .top-toast {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 16px 0;
            background-color: rgba(12, 34, 51, 0.95);
            color: #e0f0ff;
            font-size: 0.95rem;
            text-align: center;
            z-index: 20;
            box-shadow: 0 2px 8px rgba(41, 182, 246, 0.2);
            transition: all 0.3s ease;
            opacity: 0;
            transform: translateY(-100%);
        }

        .top-toast.active {
            opacity: 1;
            transform: translateY(0);
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            10%,
            30%,
            50%,
            70%,
            90% {
                transform: translateX(-5px);
            }

            20%,
            40%,
            60%,
            80% {
                transform: translateX(5px);
            }
        }

        @keyframes pulse {

            0%,
            100% {
                transform: translate(0, 0) scale(1);
                opacity: 0.6;
            }

            50% {
                transform: translate(0, 0) scale(1.2);
                opacity: 0.9;
            }
        }

        @media (max-width: 1024px) {
            .form-container {
                margin-left: 3%;
            }
        }


        @media (max-width: 768px) {
            .left-decoration {
                display: none;
            }

            .right-form {
                width: 100%;
                padding: 30px 20px;
                backdrop-filter: blur(0px);
            }

            .form-container {
                width: 90%;
                max-width: 530px;
                min-height: 404px;
                margin: auto;
                padding: 30px;
                border: 1px solid rgba(41, 182, 246, 0.2);
                border-radius: 12px;
                background: rgba(12, 34, 51, 0.4);
                backdrop-filter: blur(0.5px);
            }

            .form-title {
                font-size: 1.5rem;
                margin-bottom: 30px;
                text-align: center;
            }

            .submit-btn {
                --submitbtn_h: 45px;
                font-size: 1rem;
            }

            .back-btn {
                margin-bottom: 20px;
                display: inline-block;
            }

            .submit-container {
                margin-top: 45px;
                margin-bottom: 7px;
            }

            .top-toast {
                padding: 12px 0;
            }
        }


        @media (max-width: 425px) {
            .right-form {
                padding: 20px 15px;
            }

            .form-container {
                padding: 25px 15px;
                max-width: 95%;
            }

            .form-title {
                font-size: 1.4rem;
            }

            .submit-btn {
                --submitbtn_h: 40px;
                font-size: 0.9rem;
            }

            .form-label {
                font-size: 0.85rem;
            }

            .back-btn {
                margin-left: 6px;
                font-size: 0.65rem;
            }

            .form-group {
                margin-bottom: 20px;
            }

            .form-input {
                padding: 10px 14px;
                font-size: 0.8rem;
            }

            .submit-container {
                margin-top: 35px;
            }

            .submit-container p {
                margin-bottom: 12px;
                font-size: 0.7rem;
            }

            .top-toast {
                font-size: 0.85rem;
            }
        }
    </style>
</head>

<body>

    <div class="star-container">
        <div class="layer1"></div>
        <div class="layer2"></div>
        <div class="layer3"></div>
        <div class="layer4"></div>
        <div class="layer5"></div>
    </div>


    <div class="login-container">
        <div class="left-decoration">
            <div class="circle circle1"></div>
            <div class="circle circle2"></div>
        </div>

        <div class="right-form">
            <div class="form-container">

                <a href="./index.html" class="back-btn">
                    <i>←</i><span>返回首页</span>
                </a>

                <h2 class="form-title">用户登录/注册</h2>
                <form autocomplete="off" id="form-login">

                    <div class="form-group">
                        <label class="form-label" for="username">用户姓名</label>
                        <input type="text" id="username" name="usrName" class="form-input" placeholder="请输入您的用户名">
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="password">用户密码</label>
                        <input type="password" id="password" name="usrPwd" class="form-input" placeholder="请输入您的密码">
                    </div>

                    <div class="submit-container">
                        <p>* 不存在的账号会被自动注册</p>
                        <button type="submit" class="submit-btn">登录</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="../static/assets/data/vars.js"></script>
    <script src="../static/js/login-main.js"></script>
</body>

</html>
